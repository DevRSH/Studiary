name: CI — Studiary

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend-quality:
    name: Backend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: mypy type check
        run: mypy app/ --ignore-missing-imports

      - name: pytest
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=80
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          DATABASE_URL: sqlite+aiosqlite:///./test.db

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend-quality:
    name: Frontend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000

  # ─── Docker ─────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose config

      - name: Build backend image
        run: docker build -t studiary-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t studiary-frontend:ci ./frontend
